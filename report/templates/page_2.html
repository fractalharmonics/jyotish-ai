  <main class="page page-2">
    <section class="page-title">
      <h1>Western Chart</h1>
      <p class="subtitle">D1 circular wheel with Whole Sign houses</p>
    </section>

    <section class="western-chart-block">
      <div class="western-chart-svg">{{ western_svg }}</div>
    </section>

    <section>
      <h2>Western Graha Positions</h2>
      <table class="western-table">
        <thead>
          <tr>
            <th>Graha</th>
            <th>Longitude</th>
            <th>House</th>
            <th>Motion</th>
            <th>Speed</th>
          </tr>
        </thead>
        <tbody>
          {{ western_rows }}
        </tbody>
      </table>
    </section>

    <section>
      <h2>Western Aspects</h2>
      <table class="western-aspect-table">
        <thead>
          <tr>
            <th>Body 1</th>
            <th>Aspect</th>
            <th>Body 2</th>
            <th>Orb</th>
          </tr>
        </thead>
        <tbody>
          {{ western_aspect_rows }}
        </tbody>
      </table>
    </section>
  </main>
